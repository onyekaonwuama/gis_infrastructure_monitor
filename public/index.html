<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>GIS Services Monitor</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            background: #172033;
            color: white;
        }
        header h1 {
            margin: 0;
            font-size: 1.4rem;
        }

        #map {
            width: 100%;
            height: calc(100vh - 70px);
        }
    </style>
</head>

<body>
<header>
    <h1>GIS Infrastructure Monitor</h1>
</header>

<main id="map">
    <p>This is the frontend</p>
</main>

<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>
    const map = L.map('map').setView(
        [51.1657, 10.4515],
        6
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);
</script>
</body>
</html>
