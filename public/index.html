<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
    >

    <title>GIS Services Monitor</title>
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        header {
            height: 70px;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            background: #172033;
            color: white;
        }
        header h1 {
            margin: 0;
            font-size: 1.4rem;
        }

        #map {
            width: 100%;
            height: calc(100vh - 70px);
        }
        #message {
            position: absolute;
            z-index: 1000;
            top: 85px;
            left: 15px;
            padding: 0.75rem 1rem;
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>
<header>
    <h1>GIS Infrastructure Monitor</h1>
</header>
<div id="message">Loading GIS services...</div>
<main id="map"></main>

<script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script>
    const map = L.map('map').setView(
        [51.1657, 10.4515],
        6
    );

    L.tileLayer(
        'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom: 19,
            attribution: '&copy; OpenStreetMap contributors'
        }
    ).addTo(map);

    //fetch services
    async function loadServices() {
        const message = document.getElementById('message');

        try {
            const response = await fetch('/api/services');

            if (!response.ok) {
                throw new Error(
                    `Unable to load services. HTTP status: ${response.status}`
                );
            }

            const geoJson = await response.json();

            L.geoJSON(geoJson, {
                pointToLayer(feature, latlng) {
                    const status = feature.properties.status;

                    const statusColors = {
                        healthy: '#2e7d32',
                        degraded: '#ed6c02',
                        down: '#d32f2f',
                        unknown: '#757575'
                    };

                    const color =
                        statusColors[status] ??
                        statusColors.unknown;

                    return L.circleMarker(latlng, {
                        radius: 10,
                        color: '#ffffff',
                        weight: 2,
                        fillColor: color,
                        fillOpacity: 0.9
                    });
                },

                onEachFeature(feature, layer) {
                    const properties = feature.properties;

                    const responseTime =
                        properties.responseTimeMs === null
                            ? 'No response'
                            : `${properties.responseTimeMs} ms`;

                    layer.bindPopup(`
          <strong>${properties.name}</strong>
          <br>
          Type: ${properties.serviceType}
          <br>
          Status: ${properties.status}
          <br>
          Response time: ${responseTime}
        `);
                }
            }).addTo(map);

            message.remove();
        } catch (error) {
            console.error('Failed to load GIS services:', error);
            message.textContent = 'Unable to load GIS services.';
        }
    }

    loadServices();
</script>
</body>
</html>
